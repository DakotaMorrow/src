<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Moon Brewing</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>

    <style>

            --orange: #d68100;
            --darkgray: #181818;
            --logofont: "Lato";
            --gray: #7a7a7a;
        }
        
        body {
            font-family: "Roboto Flex", Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .landingpage {
            width: 100vw;
            height: 100vh;
            background-image: url("img/desktop_landing.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        font-family: var(--logofont);

        color: var(--orange);

      } */
        /* .hours {

        .location {
            font-family: var(--logofont);

        .infoitem {
            font-family: var(--logofont);
            font-size: 2vw;
            font-weight: 400;
            color: rgba(214, 129, 0, 0.7);
            margin-bottom: 10px;
        }
        
        .charcoalglass {
            background-color: rgba(0, 0, 0, 0.7);
            height: 100%;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 20%);
            grid-template-rows: repeat(5, 20%);
        }
        
        .landingpagepanel {
            grid-column: 3/6;
            grid-row: 4/6;
            display: grid;
            justify-items: left;
        }
        
        .infographics {
            display: grid;
            grid-template-columns: 100%;
            justify-items: center;
            width: 100%;
            background-color: var(--darkgray);
            color: white;
            border-color: var(--orange);
            border-style: solid;
            border-width: 3px 0 0 0;
        }
        
        .fourthpage {
            width: 100vw;
            height: 100vh;
            background-color: whitesmoke;
        }
        /* mobile */
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 500px) {
            .landingpage {
                background-image: url("img/mobile_landing.png");
            }
            .charcoalglass {
                grid-template-columns: 1fr;
                grid-template-rows: 100%;
            }
            .landingpagepanel {
                grid-column: 1/2;
                grid-row: 1/2;
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 20% 5% 5% 70%;
            }
            .title {
                font-size: 10vw;
                /* font-size: clamp(10px, 10vw, 40px); */
                font-weight: 500;
                text-align: center;
                align-self: end;
            }
            .hours {
                font-family: var(--logofont);
                font-size: 5vw;
                font-weight: 500;
                text-align: center;
                color: var(--orange);
            }
            .location {
                font-family: var(--logofont);
                font-size: 5vw;
                font-weight: 500;
                text-align: center;
                color: var(--orange);
            }
            .contact {
                font-family: var(--logofont);
                font-size: 6vw;
                font-weight: 500;
                text-align: center;
                color: var(--orange);
                align-self: end;
                margin-bottom: 20px;
            }
            .infographics {
                display: none;
            }
        }
        
        .logopanel {
            grid-column: 1 / 2;
            grid-row: 1/3;
            display: grid;
            align-items: end;
            justify-items: start;
        }
        
        .newtitleimage {
            grid-column: 3 / 6;
            grid-row: 2/3;
            align-self: end;
        }
        
        .logo {
            width: clamp(50px, 70%, 150px);
            margin-left: 40px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="landingpage">
        <div class="charcoalglass">
            <div class="logopanel">
                <img src="img/BrewPubLogoOutlinesOrange.png" class="logo" />
            </div>
            <div class="newtitleimage">
                <img src="img/BrewPubLogo_Horizontal_OutlineOrange.png" width="95%" />
            </div>
            <div class="landingpagepanel">
                <div>
                    <div class="infoitem">10:00 AM ~ 10:00 PM (Everyday)</div>
                    <div class="infoitem">1234 Back Alley Boulevard</div>
                    <div class="infoitem">321.654.1880</div>
                </div>
            </div>
        </div>
    </div>
    <div class="infographics" style="max-width: 100%">
        <img src="img/infographics.png" width="100%" />
    </div>

    <style>
        .moreinfo {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 40% 60%;
            align-items: center;
            justify-items: center;
            background-color: var(--darkgray);
            border-style: solid;
            border-color: var(--darkgray);
            border-radius: 5px;
            width: 500px;
            height: 200px;
            color: white;
            font-size: 10px;
        }
        
        .moreinfo2 {
            display: grid;
            width: 100%;
            height: 100%;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 100%;
            background-color: var(--orange);
        }
        
        .happenings {
            width: 100%;
            background-color: var(--orange);
        }
        
        .events {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .event {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 50px 100px;
            width: 300px;
            border-style: solid;
            border-width: 2px;
            border-color: var(--darkgray);
            border-radius: 5px;
        }
        
        .calendardate {
            font-size: 30px;
            font-weight: 500;
            background-color: var(--darkgray);
            color: white;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            text-transform: uppercase;
        }
        
        .aboutevent {
            padding: 10px;
            color: white;
            font-size: 20px;
        }
        
        .eventtitle {
            font-family: var(--logofont);
            font-size: 60px;
            text-align: center;
            color: var(--darkgray);
            padding-top: 35px;
        }
    </style>
    <div class="happenings">
        <div class="eventtitle">EVENTS</div>
        <div class="events">
            <div class="event">
                <div class="calendardate">
                    <div>OCT 22</div>
                </div>
                <div class="aboutevent">Grand Opening!</div>
            </div>

            <div class="event">
                <div class="calendardate">
                    <div>OCT 31</div>
                </div>
                <div class="aboutevent">Halloween 10% off all beverages!</div>
            </div>

            <div class="event">
                <div class="calendardate">
                    <div>nov 26</div>
                </div>
                <div class="aboutevent">Thanksgiving 10% off all food!</div>
            </div>
        </div>

            </div>
        </div> -->

    <div class="fourthpage"></div>
