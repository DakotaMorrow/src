<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Moon Brewing</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100;8..144,200;8..144,300;8..144,400;8..144,500;8..144,600;8..144,700;8..144,800;8..144,900;8..144,1000&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Roboto+Flex:opsz,wght@8..144,100;8..144,200;8..144,300;8..144,400;8..144,500;8..144,600;8..144,700;8..144,800;8..144,900;8..144,1000&display=swap"
        rel="stylesheet" />
    <style>
         :root {
            --orange: #d68100;
        }
        
        body {
            font-family: "Roboto Flex", Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .landingpage {
            width: 100vw;
            height: 100vh;
            background-image: url("img/landing_img.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }
        
        .title {
            font-family: "EB Garamond";
            font-size: 4vw;
            font-weight: 500;
            /* font-style: italic; */
            color: var(--orange);
            align-self: center;
            grid-column: 1/5;
            grid-row: 1;
        }
        
        .hours {
            font-family: "EB Garamond";
            font-size: 2.2vw;
            font-weight: 500;
            align-self: center;
            grid-column: 1/5;
            grid-row: 2;
            color: var(--orange);
        }
        
        .location {
            font-family: "EB Garamond";
            font-size: 2vw;
            font-weight: 500;
            align-self: center;
            grid-column: 1/5;
            grid-row: 3;
            color: var(--orange);
        }
        
        .contact {
            font-family: "EB Garamond";
            font-size: 2vw;
            font-weight: 500;
            align-self: center;
            grid-column: 1/5;
            grid-row: 4;
            color: var(--orange);
        }
        
        .charcoalglass {
            background-color: rgba(0, 0, 0, 0.5);
            height: 100%;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(5, 20%);
            grid-template-rows: repeat(5, 20%);
        }
        
        .landingpagepanel {
            grid-column: 4/6;
            grid-row: 2/5;
            /* background-color: rgba(255, 255, 255, 0.2); */
            /* margin: 20px; */
            display: grid;
            grid-template-columns: repeat(4, 25%);
            grid-template-rows: 40% repeat(3, 20%);
        }
        
        .inforgraphics {
            display: grid;
            grid-template-columns: 100%;
            justify-items: center;
            width: 100vw;
            background-color: #181818;
            color: white;
            border-color: var(--orange);
            border-style: solid;
            border-width: 3px 0 0 0;
        }
        
        .thirdpage {
            width: 100vw;
            height: 100vh;
            background-color: var(--orange);
        }
        
        .fourthpage {
            width: 100vw;
            height: 100vh;
            background-color: whitesmoke;
        }
    </style>
</head>

<body>
    <div class="landingpage">
        <div class="charcoalglass">
            <div class="landingpagepanel">
                <div id="brewpub" class="title">Black Moon Brewing</div>
                <div class="hours">10:00 AM ~ 10:00 PM (Everyday)</div>
                <div class="location">1234 Back Alley Boulevard</div>
                <div class="contact">321.654.1880</div>
            </div>
        </div>
    </div>
    <div class="inforgraphics">
        <img src="img/infographics.png" height="340" />
    </div>

    <div class="thirdpage"></div>
    <div class="fourthpage"></div>
