<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Moon Brewing</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Flex:opsz,wght@8..144,100;8..144,200;8..144,300;8..144,400;8..144,500;8..144,600;8..144,700;8..144,800;8..144,900;8..144,1000&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" type="text/css" href="css/site.css" />
    <link rel="stylesheet" type="text/css" href="css/landingpage.css" />

    <style></style>
</head>

<body>
    <!-- ------------------------------------------------------------------ -->

    <div id="menu_mobile" class="menu_mobile menuInvisible_mobile">
        <div id="xMenu" class="xMenu" onclick="menuXClick()">
            <i class="fa-solid fa-x"></i>
        </div>
    </div>

    <div id="hamburgerMenu" class="" style="color: white; position: fixed; top: 30px; left: 30px" onclick="menuHamburgerClick()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="landingpage_mobile">
        <div class="charcoalglass">
            <div class="logopanel_mobile">
                <div class="logo_mobile">
                    <img src="img/BrewPubLogoOutlinesOrange.png" width="40%" alt="logo" />
                </div>
            </div>

            <div style="align-self: end; padding-bottom: 50px" class="info_mobile">
                <div class="infoitem_mobile">10:00 AM ~ 10:00 PM (Everyday)</div>
                <div class="infoitem_mobile">1234 Back Alley Boulevard</div>
                <div class="infoitem_mobile">321.654.1880</div>
            </div>
        </div>
    </div>

    <div class="landingpage_desktop">
        <div class="charcoalglass">
            <div class="menu_desktop">
                <div class="menuitem_desktop">About</div>
                <div class="menuitem_desktop">Home</div>
                <div class="menuitem_desktop">Beer</div>
                <div class="menuitem_desktop">Events</div>
                <div style="width: 50px"></div>
            </div>
            <div class="logopanel_desktop">
                <img src="img/BrewPubLogoOutlinesOrange.png" class="logo_desktop" />
            </div>

            <div class="newtitleimage">
                <img src="img/BrewPubLogo_Horizontal_OutlineOrange.png" width="95%" />
            </div>

            <div class="landingpagepanel">
                <div>
                    <div class="infoitem">10:00 AM ~ 10:00 PM (Everyday)</div>
                    <div class="infoitem">1234 Back Alley Boulevard</div>
                    <div class="infoitem">321.654.1880</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ------------------------------------------------------------------ -->

    <div class="infographics" style="max-width: 100%">
        <img src="img/infographics.png" width="100%" />
    </div>

    <!-- ------------------------------------------------------------------ -->

    <div class="happenings">
        <div class="eventtitle">EVENTS</div>
        <div class="events">
            <div class="event">
                <div class="calendardate">
                    <div>OCT 22</div>
                </div>
                <div class="aboutevent">Grand Opening!</div>
            </div>

            <div class="event">
                <div class="calendardate">
                    <div>OCT 31</div>
                </div>
                <div class="aboutevent">Halloween 10% off all beverages!</div>
            </div>

            <div class="event">
                <div class="calendardate">
                    <div>nov 26</div>
                </div>
                <div class="aboutevent">Thanksgiving 10% off all food!</div>
            </div>
        </div>
    </div>

    <!-- ------------------------------------------------------------------ -->

    <div></div>
    <div class="fourthpage"></div>

    <script>
        function menuHamburgerClick() {
            menuElement = document.getElementById("menu_mobile");
            hamburgerElement = document.getElementById("hamburgerMenu");
            menuElement.classList.remove("menuInvisible_mobile");
            menuElement.classList.add("menuVisible_mobile");
            hamburgerElement.style.color = "transparent";
        }

        function menuXClick() {
            menuElement = document.getElementById("menu_mobile");
            hamburgerElement = document.getElementById("hamburgerMenu");
            menuElement.classList.add("menuInvisible_mobile");
            menuElement.classList.remove("menuVisible_mobile");
            hamburgerElement.style.color = "white";
        }
    </script>

</body>

</html>
